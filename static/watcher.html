<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watcher - Baby Cam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .room-list {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .room-item {
            background: #333;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-item:hover {
            background: #444;
            transform: translateX(5px);
        }

        .room-name {
            font-weight: 600;
            font-size: 18px;
        }

        .room-viewers {
            color: #48bb78;
            font-size: 14px;
        }

        .password-form {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #444;
            border-radius: 5px;
            background: #333;
            color: white;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .connect-btn {
            background: #48bb78;
            color: white;
        }

        .connect-btn:hover {
            background: #38a169;
        }

        .disconnect-btn {
            background: #f56565;
            color: white;
        }

        .disconnect-btn:hover {
            background: #e53e3e;
        }

        .back-btn {
            background: #4a5568;
            color: white;
            margin-top: 10px;
        }

        .back-btn:hover {
            background: #2d3748;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            display: block;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .status {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>視聴モード</h1>

        <div id="roomListView">
            <div class="room-list">
                <h2 style="margin-bottom: 20px;">アクティブな部屋</h2>
                <div id="roomList" class="loading">読み込み中...</div>
            </div>
        </div>

        <div id="passwordView" class="hidden">
            <div class="password-form">
                <h2 style="margin-bottom: 20px;" id="selectedRoomName"></h2>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="password" placeholder="部屋のパスワードを入力">
                </div>
                <button class="connect-btn" onclick="connectToRoom()">接続</button>
                <button class="back-btn" onclick="showRoomList()">戻る</button>
            </div>
        </div>

        <div id="videoView" class="hidden">
            <div class="status">
                <strong id="currentRoomName"></strong> に接続中
            </div>
            <div class="video-container">
                <video id="remoteVideo" autoplay playsinline controls></video>
            </div>
            <button class="disconnect-btn" onclick="disconnect()">切断</button>
        </div>
    </div>

    <script>
        let ws = null;
        let pc = null;
        let selectedRoomId = null;
        let iceConfig = null;

        async function loadICEConfig() {
            try {
                const response = await fetch('/api/ice-config');
                iceConfig = await response.json();
            } catch (error) {
                console.error('Failed to load ICE config:', error);
                iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            }
        }

        async function loadRoomList() {
            try {
                const response = await fetch('/api/rooms');
                const rooms = await response.json();

                const roomListEl = document.getElementById('roomList');

                if (rooms.length === 0) {
                    roomListEl.innerHTML = '<div class="loading">現在アクティブな部屋はありません</div>';
                } else {
                    roomListEl.innerHTML = '';
                    rooms.forEach(room => {
                        const roomEl = document.createElement('div');
                        roomEl.className = 'room-item';
                        roomEl.onclick = () => selectRoom(room.id);
                        roomEl.innerHTML = `
                            <div class="room-name">${room.id}</div>
                            <div class="room-viewers">👁 ${room.watcherCount} 視聴中</div>
                        `;
                        roomListEl.appendChild(roomEl);
                    });
                }
            } catch (error) {
                console.error('Failed to load room list:', error);
                document.getElementById('roomList').innerHTML = '<div class="loading">部屋一覧の取得に失敗しました</div>';
            }
        }

        function selectRoom(roomId) {
            selectedRoomId = roomId;
            document.getElementById('selectedRoomName').textContent = roomId;
            document.getElementById('roomListView').classList.add('hidden');
            document.getElementById('passwordView').classList.remove('hidden');
        }

        function showRoomList() {
            document.getElementById('passwordView').classList.add('hidden');
            document.getElementById('roomListView').classList.remove('hidden');
            document.getElementById('password').value = '';
            loadRoomList();
        }

        async function connectToRoom() {
            const password = document.getElementById('password').value;

            if (!password) {
                alert('パスワードを入力してください');
                return;
            }

            try {
                await loadICEConfig();

                pc = new RTCPeerConnection(iceConfig);

                pc.ontrack = (event) => {
                    console.log('Received remote track');
                    document.getElementById('remoteVideo').srcObject = event.streams[0];
                };

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        ws.send(JSON.stringify({
                            type: 'candidate',
                            candidate: event.candidate
                        }));
                    }
                };

                pc.onconnectionstatechange = () => {
                    console.log('Connection state:', pc.connectionState);
                    if (pc.connectionState === 'failed') {
                        alert('接続に失敗しました');
                        disconnect();
                    }
                };

                const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/watch/${encodeURIComponent(selectedRoomId)}?pass=${encodeURIComponent(password)}`;
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    document.getElementById('passwordView').classList.add('hidden');
                    document.getElementById('videoView').classList.remove('hidden');
                    document.getElementById('currentRoomName').textContent = selectedRoomId;
                };

                ws.onmessage = handleMessage;

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    alert('接続エラーが発生しました');
                    disconnect();
                };

                ws.onclose = () => {
                    console.log('WebSocket closed');
                    disconnect();
                };

            } catch (error) {
                console.error('Failed to connect:', error);
                alert('接続に失敗しました');
            }
        }

        async function handleMessage(event) {
            const message = JSON.parse(event.data);

            switch (message.type) {
                case 'offer':
                    await handleOffer(message);
                    break;

                case 'candidate':
                    await handleCandidate(message);
                    break;

                case 'error':
                    console.error('Server error:', message.error);
                    alert('エラー: ' + message.error);
                    disconnect();
                    break;
            }
        }

        async function handleOffer(message) {
            await pc.setRemoteDescription(new RTCSessionDescription({
                type: 'offer',
                sdp: message.sdp
            }));

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            ws.send(JSON.stringify({
                type: 'answer',
                sdp: answer.sdp
            }));
        }

        async function handleCandidate(message) {
            if (message.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }

            if (pc) {
                pc.close();
                pc = null;
            }

            document.getElementById('videoView').classList.add('hidden');
            document.getElementById('roomListView').classList.remove('hidden');
            document.getElementById('password').value = '';

            const video = document.getElementById('remoteVideo');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }

            loadRoomList();
        }

        window.addEventListener('load', () => {
            loadRoomList();
            setInterval(loadRoomList, 5000);
        });

        window.addEventListener('beforeunload', () => {
            disconnect();
        });
    </script>
</body>
</html>
