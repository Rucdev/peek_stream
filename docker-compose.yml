version: '3.8'

services:
  app:
    build: ./server
    environment:
      - CLOUDFLARE_TURN_API_KEY=${CLOUDFLARE_TURN_API_KEY:-}
      - PORT=8080
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - baby-cam-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - baby-cam-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - baby-cam-network

networks:
  baby-cam-network:
    driver: bridge
