<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera - Baby Cam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .setup-form {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #444;
            border-radius: 5px;
            background: #333;
            color: white;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn {
            background: #48bb78;
            color: white;
        }

        .start-btn:hover {
            background: #38a169;
        }

        .stop-btn {
            background: #f56565;
            color: white;
        }

        .stop-btn:hover {
            background: #e53e3e;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            display: block;
        }

        .status {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .status-text {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .viewer-count {
            font-size: 24px;
            font-weight: bold;
            color: #48bb78;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>カメラモード</h1>

        <div id="setupForm" class="setup-form">
            <div class="form-group">
                <label>部屋名</label>
                <input type="text" id="roomId" placeholder="例: baby-room-1">
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" id="password" placeholder="視聴者が入力するパスワード">
            </div>
            <button class="start-btn" onclick="startBroadcast()">配信開始</button>
        </div>

        <div id="broadcastView" class="hidden">
            <div class="video-container">
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
            <div class="status">
                <div class="status-text">視聴者数</div>
                <div class="viewer-count" id="viewerCount">0</div>
            </div>
            <button class="stop-btn" onclick="stopBroadcast()" style="margin-top: 20px;">配信停止</button>
        </div>
    </div>

    <script>
        let ws = null;
        let localStream = null;
        let peerConnections = {};
        let iceConfig = null;

        async function loadICEConfig() {
            try {
                const response = await fetch('/api/ice-config');
                iceConfig = await response.json();
            } catch (error) {
                console.error('Failed to load ICE config:', error);
                iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            }
        }

        async function startBroadcast() {
            const roomId = document.getElementById('roomId').value.trim();
            const password = document.getElementById('password').value;

            if (!roomId || !password) {
                alert('部屋名とパスワードを入力してください');
                return;
            }

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720 },
                    audio: true
                });

                document.getElementById('localVideo').srcObject = localStream;

                await loadICEConfig();

                const wsUrl = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/camera/${encodeURIComponent(roomId)}?pass=${encodeURIComponent(password)}`;
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    document.getElementById('setupForm').classList.add('hidden');
                    document.getElementById('broadcastView').classList.remove('hidden');
                };

                ws.onmessage = handleMessage;

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    alert('接続エラーが発生しました');
                };

                ws.onclose = () => {
                    console.log('WebSocket closed');
                    cleanup();
                };

            } catch (error) {
                console.error('Failed to start broadcast:', error);
                alert('カメラ・マイクへのアクセスに失敗しました');
            }
        }

        async function handleMessage(event) {
            const message = JSON.parse(event.data);

            switch (message.type) {
                case 'watcher_joined':
                    await createPeerConnection(message.peerId);
                    break;

                case 'answer':
                    await handleAnswer(message);
                    break;

                case 'candidate':
                    await handleCandidate(message);
                    break;

                case 'watcher_left':
                    closePeerConnection(message.peerId);
                    break;
            }

            updateViewerCount();
        }

        async function createPeerConnection(peerId) {
            const pc = new RTCPeerConnection(iceConfig);
            peerConnections[peerId] = pc;

            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: 'candidate',
                        candidate: event.candidate,
                        peerId: peerId
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                console.log(`Connection state for ${peerId}: ${pc.connectionState}`);
                if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
                    closePeerConnection(peerId);
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            ws.send(JSON.stringify({
                type: 'offer',
                sdp: offer.sdp,
                peerId: peerId
            }));
        }

        async function handleAnswer(message) {
            const pc = peerConnections[message.peerId];
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription({
                    type: 'answer',
                    sdp: message.sdp
                }));
            }
        }

        async function handleCandidate(message) {
            const pc = peerConnections[message.peerId];
            if (pc && message.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
            }
        }

        function closePeerConnection(peerId) {
            const pc = peerConnections[peerId];
            if (pc) {
                pc.close();
                delete peerConnections[peerId];
            }
            updateViewerCount();
        }

        function updateViewerCount() {
            const count = Object.keys(peerConnections).length;
            document.getElementById('viewerCount').textContent = count;
        }

        function stopBroadcast() {
            if (ws) {
                ws.close();
            }
            cleanup();
        }

        function cleanup() {
            Object.keys(peerConnections).forEach(peerId => {
                peerConnections[peerId].close();
            });
            peerConnections = {};

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            document.getElementById('setupForm').classList.remove('hidden');
            document.getElementById('broadcastView').classList.add('hidden');
            document.getElementById('viewerCount').textContent = '0';
        }
    </script>
</body>
</html>
